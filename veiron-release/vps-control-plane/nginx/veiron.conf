# Shared rate-limit zones (vps-fix.md: keep public mining protected but not thrashy).
limit_req_zone $binary_remote_addr zone=veiron_fleet:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=veiron_rpc_submit:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=veiron_rpc_read:10m rate=10r/s;

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __DOMAIN__;
    ssl_certificate /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;

    # --- Lightweight RPC liveness (no aggressive rate limit; stable for desktop) ---
    location = /health {
        proxy_pass http://127.0.0.1:10787;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_send_timeout 15s;
        proxy_read_timeout 15s;
        add_header Access-Control-Allow-Origin "*" always;
    }

    location = /status {
        proxy_pass http://127.0.0.1:10787;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Status may load chain under load; keep above desktop client timeout.
        proxy_connect_timeout 10s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
        limit_req zone=veiron_rpc_read burst=40 nodelay;
        add_header Access-Control-Allow-Origin "*" always;
    }

    location = /network {
        proxy_pass http://127.0.0.1:10787;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        limit_req zone=veiron_rpc_read burst=20 nodelay;
        add_header Access-Control-Allow-Origin "*" always;
    }

    location = /fleet/status {
        proxy_pass http://127.0.0.1:10788/public/topology;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin "*" always;
    }

    location /fleet/ {
        proxy_pass http://127.0.0.1:10788/fleet/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        client_max_body_size 256k;
        limit_req zone=veiron_fleet burst=20 nodelay;
    }

    location /control/ {
        auth_basic "Veiron Fleet Control";
        auth_basic_user_file /etc/veiron-control/admin.htpasswd;
        proxy_set_header X-Veiron-Admin-Authenticated 1;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass http://127.0.0.1:10788/;
    }

    location = /pool { return 301 /pool/; }
    location /pool/ {
        proxy_pass http://127.0.0.1:30787/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 64k;
        limit_req zone=veiron_fleet burst=120 nodelay;
    }

    location = /transactions {
        limit_except POST OPTIONS { deny all; }
        limit_req zone=veiron_rpc_submit burst=10 nodelay;
        proxy_pass http://127.0.0.1:10787;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 64k;
    }

    # Solo miners (desktop/CLI). Higher burst + keep-alive (vps-fix.md).
    location ^~ /mining/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Veiron-Client" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
        # Control Center clients get a larger burst than anonymous scanners.
        limit_req zone=veiron_rpc_submit burst=200 nodelay;
        proxy_pass http://127.0.0.1:10787;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Veiron-Client $http_x_veiron_client;
        proxy_connect_timeout 10s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
        client_max_body_size 64k;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # Desktop Control Center telemetry bundle (dedicated, higher read allowance).
    # Optional path: same backend as public RPC, separate limit zone identity.
    location ^~ /cc/ {
        rewrite ^/cc/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:10787;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Veiron-Client control-center;
        proxy_connect_timeout 10s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
        limit_req zone=veiron_rpc_read burst=80 nodelay;
        client_max_body_size 64k;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # Browser/Tauri-web preflight for public RPC reads.
    location / {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Veiron-Client" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
        proxy_pass http://127.0.0.1:10787;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 10s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
        limit_req zone=veiron_rpc_read burst=60 nodelay;
        client_max_body_size 64k;
        add_header Access-Control-Allow-Origin "*" always;
    }
}
