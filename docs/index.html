<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Veiron Network technical documentation — protocol, architecture, mining, security, operations and release maturity." />
  <meta name="theme-color" content="#07111f" />
  <title>Veiron Network Documentation</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22%2307111f%22/><path d=%22M18 20h18l14 42 14-42h18L59 82H41z%22 fill=%22%2317d9ff%22/></svg>" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <link rel="stylesheet" href="./assets/docs.css" />
</head>
<body>
  <noscript>Veiron documentation requires JavaScript to render the Markdown website.</noscript>
  <div id="app">Loading Veiron documentation…</div>

  <script>
    window.$docsify = {
      name: 'Veiron Network',
      repo: 'andreidohot/Veiron-Network-Main',
      homepage: 'README.md',
      loadSidebar: true,
      loadNavbar: true,
      coverpage: true,
      onlyCover: false,
      auto2top: true,
      maxLevel: 4,
      subMaxLevel: 3,
      relativePath: true,
      mergeNavbar: true,
      executeScript: false,
      notFoundPage: true,
      search: {
        placeholder: 'Search documentation',
        noData: 'No matching documentation found.',
        depth: 4,
        hideOtherSidebarContent: false
      },
      copyCode: {
        buttonText: 'Copy',
        errorText: 'Failed',
        successText: 'Copied'
      },
      pagination: {
        previousText: 'Previous',
        nextText: 'Next',
        crossChapter: true,
        crossChapterText: true
      },
      plugins: [
        function candidateBanner(hook) {
          hook.afterEach(function (html) {
            return '<div class="network-warning"><strong>Mainnet Candidate / Experimental Prototype</strong><span>This documentation does not declare a public live mainnet. VIRE is not authorized for real-funds use.</span></div>' + html;
          });
        }
      ]
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-rust.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-powershell.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-toml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
</body>
</html>
