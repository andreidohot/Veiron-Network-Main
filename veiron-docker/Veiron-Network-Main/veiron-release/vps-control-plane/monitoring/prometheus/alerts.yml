groups:
  - name: veiron-core
    rules:
      - alert: VeironEndpointDown
        expr: probe_success{job="veiron-http"} == 0
        for: 2m
        labels:
          severity: critical
          service: "{{ $labels.instance }}"
        annotations:
          summary: "Veiron endpoint is unreachable"
          description: "{{ $labels.instance }} has failed blackbox probes for more than two minutes."

      - alert: VeironContainerMissing
        expr: count(container_last_seen{name=~"veiron-(node|rpc|control|indexer)"}) < 4
        for: 2m
        labels:
          severity: critical
          service: docker
        annotations:
          summary: "A core Veiron container is missing"
          description: "cAdvisor cannot see one or more core Veiron containers."

      - alert: VeironContainerRestarting
        expr: changes(container_start_time_seconds{name=~"veiron-.*"}[15m]) > 2
        for: 5m
        labels:
          severity: warning
          service: "{{ $labels.name }}"
        annotations:
          summary: "Veiron container restart loop"
          description: "{{ $labels.name }} appears to be restarting repeatedly."

      - alert: HostDiskAlmostFull
        expr: |
          (
            node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"}
            /
            node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}
          ) < 0.10
        for: 10m
        labels:
          severity: critical
          service: host-storage
        annotations:
          summary: "Host disk has less than 10% free space"
          description: "Filesystem {{ $labels.mountpoint }} is nearly full."

      - alert: HostMemoryPressure
        expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) < 0.10
        for: 10m
        labels:
          severity: warning
          service: host-memory
        annotations:
          summary: "Host memory pressure"
          description: "Available memory has remained below 10% for ten minutes."

      - alert: PostgreSQLExporterDown
        expr: up{job="postgres-exporter"} == 0
        for: 2m
        labels:
          severity: critical
          service: postgres
        annotations:
          summary: "PostgreSQL monitoring is down"
          description: "The PostgreSQL exporter cannot be scraped."

      - alert: VeironBackupStale
        expr: time() - veiron_backup_last_success_unixtime > 129600
        for: 15m
        labels:
          severity: critical
          service: backup
        annotations:
          summary: "Veiron backup is stale"
          description: "No successful backup has been recorded for more than 36 hours."
