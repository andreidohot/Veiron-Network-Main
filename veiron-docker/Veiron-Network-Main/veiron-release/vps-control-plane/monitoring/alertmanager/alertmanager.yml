global:
  resolve_timeout: 5m

route:
  receiver: veiron-webhook
  group_by: [alertname, service]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: veiron-webhook
    webhook_configs:
      - url: http://veiron-ops:8080/api/alerts/discord
        send_resolved: true
