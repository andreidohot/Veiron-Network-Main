name: Release Gate

on:
  push:
    branches:
      - main
    paths:
      - "scripts/security/**"
      - "scripts/release/**"
      - "scripts/git/**"
      - "veiron-release/**"
      - ".github/workflows/release-gate.yml"
  pull_request:
    paths:
      - "scripts/security/**"
      - "scripts/release/**"
      - "scripts/git/**"
      - "veiron-release/**"
      - ".github/workflows/release-gate.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: veiron-explorer/package-lock.json

      - name: Script help smoke tests
        run: |
          bash scripts/security/check-secrets.sh --help
          bash scripts/security/check-repo-hygiene.sh --help
          bash scripts/security/check-config-safety.sh --help
          bash scripts/release/release-gate.sh --help

      - name: Secret scan
        run: bash scripts/security/check-secrets.sh

      - name: Repository hygiene scan
        run: bash scripts/security/check-repo-hygiene.sh

      - name: Config safety scan
        run: bash scripts/security/check-config-safety.sh

      - name: Release gate
        run: bash scripts/release/release-gate.sh
