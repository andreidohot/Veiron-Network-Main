name: Linux Desktop Standalone Release

on:
  push:
    tags:
      - "v*-linux.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing Linux release tag
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: linux-desktop-release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  package-and-publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Jimver/cuda-toolkit@3d45d157f327c09c04b50ee6ccdea2d9d017ec76
        with:
          cuda: "13.2.0"
          method: network
          sub-packages: '["nvcc", "cudart-dev"]'
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: veiron-desktop-tauri/package-lock.json

      - name: Install Linux packaging dependencies
        run: >-
          sudo apt-get update && sudo apt-get install -y
          libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
          libsecret-1-dev libdbus-1-dev zenity fakeroot rpm libarchive-tools

      - name: Build Linux Control Center distributions
        run: bash scripts/release/build-linux-desktop.sh

      - name: Stage assets and generate checksums
        run: |
          set -euo pipefail
          mkdir -p release-publish/linux
          find veiron-release/apps/linux -maxdepth 1 -type f -exec cp {} release-publish/linux/ \;
          test -n "$(find release-publish/linux -type f -print -quit)"
          (
            cd release-publish/linux
            find . -maxdepth 1 -type f ! -name 'SHA256SUMS-LINUX.txt' -print0 \
              | sort -z \
              | xargs -0 sha256sum > SHA256SUMS-LINUX.txt
          )

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: veiron-control-center-linux-${{ env.RELEASE_TAG }}
          if-no-files-found: error
          path: release-publish/linux/*

      - name: Publish standalone Linux prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --verify-tag \
              --title "Veiron Linux $RELEASE_TAG" \
              --notes "Standalone Linux Control Center build." \
              --prerelease
          fi
          gh release upload "$RELEASE_TAG" release-publish/linux/* --clobber
