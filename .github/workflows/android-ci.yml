name: Android Client CI

on:
  push:
    branches: [main]
    paths:
      - "veiron-android/**"
      - "veiron-mobile-core/**"
      - "veiron-core/**"
      - ".github/workflows/android-ci.yml"
  pull_request:
    paths:
      - "veiron-android/**"
      - "veiron-mobile-core/**"
      - "veiron-core/**"
      - ".github/workflows/android-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-debug:
    runs-on: self-hosted
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Build and verify Android debug APK
        working-directory: veiron-android
        shell: powershell
        run: .\gradlew.bat --no-daemon clean testDebugUnitTest lintDebug assembleDebugAndroidTest assembleDebug verifyDebugNativeLibraries

      - name: Upload Android debug APK
        uses: actions/upload-artifact@v4
        with:
          name: veiron-android-debug
          if-no-files-found: error
          path: veiron-android/app/build/outputs/apk/debug/*.apk
